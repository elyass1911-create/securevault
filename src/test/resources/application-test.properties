spring.datasource.url=jdbc:h2:mem:securevault_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# IMPORTANT: >= 32 chars, sonst crasht JwtService
security.jwt.secret=TEST_JWT_SECRET_FOR_TESTS_ONLY_1234

# AES key base64 (32 bytes -> base64)
security.aes.key-base64=VEVTVF9BRVNfS0VZX0ZPUl9URVNUU19PTkxZXzEyMzQ=
app.security.trust-forward-headers=true
