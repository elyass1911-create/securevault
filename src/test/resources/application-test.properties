spring.datasource.url=jdbc:h2:mem:securevault_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# IMPORTANT: >= 32 chars, sonst crasht JwtService
security.jwt.secret=0123456789abcdef0123456789abcdef

# AES key base64 (32 bytes -> base64)
security.aes.key-base64=MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDE=