spring.application.name=securevault
spring.datasource.url=jdbc:postgresql://localhost:5432/securevault
spring.datasource.username=admin
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
security.jwt.expiration-minutes=60
security.jwt.secret=${JWT_SECRET}
security.aes.key-base64=${AES_KEY}
spring.jpa.open-in-view=false
app.security.trust-forward-headers=${TRUST_FORWARD_HEADERS:false}
app.security.public-docs-enabled=${PUBLIC_DOCS_ENABLED:false}
springdoc.api-docs.enabled=${PUBLIC_DOCS_ENABLED:false}
springdoc.swagger-ui.enabled=${PUBLIC_DOCS_ENABLED:false}
