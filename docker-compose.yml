version: '3.8'

services:
  db:
    image: postgres:15
    container_name: securevault-db
    environment:
      POSTGRES_DB: securevault
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: