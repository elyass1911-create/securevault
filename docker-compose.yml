version: "3.8"

services:
  db:
    image: postgres:15
    container_name: securevault-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-securevault}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: securevault-api
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      # DB im Docker-Netzwerk heißt "db"
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-securevault}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-admin}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}

      JWT_SECRET: ${JWT_SECRET}
      AES_KEY: ${AES_KEY}

volumes:
  postgres_data: